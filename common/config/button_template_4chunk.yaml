    icon: "mdi:file-tree"
    update_interval: never
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "${entity_subpage_config_ext_2_prefix}${num}${entity_subpage_config_ext_2_suffix}"
    internal: true
    id: subpage_${num}_config_ext_2
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 255
    mode: text
    entity_category: config
    icon: "mdi:file-tree"
    update_interval: never
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "${entity_subpage_config_ext_3_prefix}${num}${entity_subpage_config_ext_3_suffix}"
    internal: true
    id: subpage_${num}_config_ext_3
