# =============================================================================
# ESPHome Configuration - Tuya T3E Smart Panel
# =============================================================================
# INSTRUCTIONS:
# 1. Copy this file to your ESPHome config directory as "tuya-t3e.yaml"
# 2. Replace "my-device-name" with your preferred device name
# 3. Create a secrets.yaml file with wifi_ssid and wifi_password
# 4. Add this config in ESPHome Dashboard or run: esphome run tuya-t3e.yaml
# 5. Flash to device via WiFi (or USB-C first time)
#
# The web UI (www.js) is automatically fetched from GitHub Pages on device boot.
# =============================================================================

# Device naming
substitutions:
  name: "my-device-name"          # Change this to your device name
  friendly_name: "Tuya T3E Panel"

# ESPHome core configuration
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - -mlongcalls
      - -mtext-section-literals

# WiFi configuration (uses secrets.yaml)
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

# Optional: Static IP (uncomment to use)
# wifi:
#   ssid: !secret wifi_ssid
#   password: !secret wifi_password
#   manual_ip:
#     static_ip: 192.168.1.100
#     gateway: 192.168.1.1
#     subnet: 255.255.255.0

# Enable fallback hotspot (for setup)
ap:
  ssid: "EspControl-${name}"
  password: "12345678"

# Load all device configuration from remote repository
packages:
  tuya_t3e: !include https://raw.githubusercontent.com/txptr/espcontrol-tuya-t3e/main/devices/tuya-t3e/packages.yaml

# ESPHome components (from espcontrol repository)
external_components:
  - source:
      type: git
      url: https://github.com/jtenniswood/espcontrol
      ref: main
      path: components
    components: [espcontrol, web_server_idf, artwork_image]
    refresh: 1s

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

# Over-the-air updates (optional)
ota:
  password: !secret ota_password

# NTP for time sync
time:
  - platform: sntp
    id: sntp_time
