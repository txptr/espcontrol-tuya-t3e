# =============================================================================
# CONFIG: BUTTON TEMPLATE (parameterized by ${num})
# =============================================================================
# Compact per-button config for smaller devices. Keeps the main button config
# plus four subpage chunks instead of the full eight-chunk template.
# =============================================================================

text:
  - platform: template
    name: "${entity_button_config_prefix}${num}${entity_button_config_suffix}"
    internal: true
    id: button_${num}_config
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 255
    mode: text
    entity_category: config
    icon: "mdi:cog"
    update_interval: never
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "${entity_subpage_config_prefix}${num}${entity_subpage_config_suffix}"
    internal: true
    id: subpage_${num}_config
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 255
    mode: text
    entity_category: config
    icon: "mdi:file-tree"
    update_interval: never
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "${entity_subpage_config_ext_prefix}${num}${entity_subpage_config_ext_suffix}"
